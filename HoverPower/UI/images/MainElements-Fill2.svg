<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Colors:
       White   = house shell
       Blue    = interior fill panels
  -->

  <g id="house-icon">
    <!-- House shell -->
    <g id="house-shell" fill="#FFFFFF">
      <!-- Left wall -->
      <polygon
        id="left-wall"
        points="4 23.561 4 9.185 16.006 15.176 16.006 29.563"
      />

      <!-- Right wall -->
      <polygon
        id="right-wall"
        points="28.005 23.561 28.005 9.185 16 15.176 16 29.563"
      />

      <!-- Roof -->
      <polygon
        id="roof"
        points="28.005 9.561 21.351 1.248 10.018 4.969 16 15.563"
      />

      <!-- Front triangle outer frame -->
      <polygon
        id="front-gable"
        points="4 9.185 10.054 4.927 15.936 15.307"
      />
    </g>

    <!-- Blue interior panels -->
    <g id="house-panels" fill="#80DDFF">
      <!-- Left wall panel -->
      <polygon
        id="left-panel"
        points="6.174 21.404 13.831 25.213 13.831 17.332 6.174 13.645"
      />

      <!-- Right wall panel -->
      <polygon
        id="right-panel"
        points="25.831 21.404 18.174 25.213 18.174 17.332 25.831 13.645"
      />

      <!-- Roof panel -->
      <polygon
        id="roof-panel"
        points="25.242 9.04 17.39 12.604 12.83 5.478 20.63 2.832"
      />

      <!-- Front triangle inner fill -->
      <polygon
        id="front-gable-panel"
        points="6.4 9.55 10.05 6.95 13.5 13.05"
      />
    </g>
  </g>
</svg>
